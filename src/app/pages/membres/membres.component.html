<div class="p-4">
<div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">Gestion des Membres</h1>
    <button mat-raised-button color="primary">
    + Nouveau membre
    </button>
</div>

<table mat-table [dataSource]="membres" class="w-full shadow">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let m">{{ m.id }}</td>
    </ng-container>

    <ng-container matColumnDef="nom">
      <th mat-header-cell *matHeaderCellDef>Nom</th>
      <td mat-cell *matCellDef="let m">{{ m.nom }}</td>
    </ng-container>

    <ng-container matColumnDef="prenom">
      <th mat-header-cell *matHeaderCellDef>Prénom</th>
      <td mat-cell *matCellDef="let m">{{ m.prenom }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let m">{{ m.email }}</td>
    </ng-container>

    <ng-container matColumnDef="telephone">
      <th mat-header-cell *matHeaderCellDef>Téléphone</th>
      <td mat-cell *matCellDef="let m">{{ m.telephone }}</td>
    </ng-container>

    <ng-container matColumnDef="solde">
      <th mat-header-cell *matHeaderCellDef>Solde</th>
      <td mat-cell *matCellDef="let m">{{ m.solde }} €</td>
    </ng-container>

    <ng-container matColumnDef="actif">
      <th mat-header-cell *matHeaderCellDef>Actif</th>
      <td mat-cell *matCellDef="let m">
        <span [class]="m.actif ? 'text-green-600' : 'text-red-600'">
        {{ m.actif ? 'Oui' : 'Non' }}
        </span>
    </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let m">
        <button mat-icon-button color="warn" (click)="supprimerMembre(m.id)">
        <mat-icon>delete</mat-icon>
        </button>
    </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
</div>
